version: '3.8'

services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: retail-postgres
    environment:
      POSTGRES_DB: retail_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"  # External port 5433 to avoid conflicts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - retail-network

  # ===========================================
  # Redis Cache
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: retail-redis
    command: redis-server --requirepass redis_password_123
    ports:
      - "6380:6379"  # External port 6380 to avoid conflicts
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_password_123", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - retail-network

  # ===========================================
  # Spring Boot Application
  # ===========================================
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: retail-api
    ports:
      - "8081:8080"  # External port 8081 to avoid conflicts
    environment:
      # Spring Profile
      SPRING_PROFILES_ACTIVE: local

      # Database (internal Docker network)
      DATABASE_URL: jdbc:postgresql://postgres:5432/retail_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123

      # Redis (internal Docker network)
      REDIS_URL: redis://:redis_password_123@redis:6379

      # JWT Secret (change in production!)
      JWT_SECRET: mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm

      # JVM Options
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - retail-network

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres_data:
  redis_data:

# ===========================================
# Networks
# ===========================================
networks:
  retail-network:
    driver: bridge

